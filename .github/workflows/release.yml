name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/aicery
          path: aicery
          ref: main
        continue-on-error: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Link Aicery SDK
        run: |
          if [[ -d aicery/sdk/typescript ]]; then
            npm install --no-save file:../aicery/sdk/typescript
          fi
      - name: Build sidecar stub
        run: ./scripts/build-sidecar-stub.sh ${{ matrix.target }}
      - run: npm ci
      - run: npm run tauri build -- --target ${{ matrix.target }}
        env:
          CI: true
