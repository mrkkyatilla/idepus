# Mount idepus-plugin into the Aicery API container.
# Use with: ./scripts/aicery-up.sh
services:
  api:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${IDEPUS_PLUGIN_PATH}:/idepus-plugin:ro
    environment:
      PLUGIN_PATHS: /idepus-plugin
      IDEPUS_BRIDGE_URL: http://host.docker.internal:17373
      IDEPUS_BRIDGE_TOKEN: ${IDEPUS_BRIDGE_TOKEN:-idepus-dev-bridge}
      USE_MOCK_PROVIDER: ${USE_MOCK_PROVIDER:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-haiku-20241022}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
